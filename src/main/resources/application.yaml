# Server
server:
  port: ${SERVER_PORT}


# Spring
spring:
  application:
    name: deokgil-server


  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL}
        show_sql: ${JPA_SHOW_SQL}
        dialect: org.hibernate.dialect.MySQLDialect


  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
    # 클라이언트가 ?size=로 페이지 크기를 임의로 키워 DB/응답 메모리에 부담을 주는 것을 방지.
    web:
      pageable:
        max-page-size: 50


  # OAuth2
  security:
    oauth2:
      client:
        registration:

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - openid
              - profile
              - email


# AWS S3 (프로필 이미지 업로드용 presigned URL 발급에 사용)
aws:
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET}


# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}


# Refresh Token Cookie
cookie:
  secure: ${COOKIE_SECURE}
  same-site: ${COOKIE_SAME_SITE}
  domain: ${COOKIE_DOMAIN}


# claude AI API
claude:
  api:
    key: ${CLAUDE_API_KEY}


# 카카오 로컬 API (주소 -> 좌표 변환)
kakao:
  api:
    key: ${KAKAO_API_KEY}


# 기상청 단기예보 조회서비스 (공공데이터포털 발급 서비스키)
weather:
  api:
    key: ${WEATHER_API_KEY}


# Firebase Cloud Messaging (푸시 알림) - Firebase 콘솔에서 발급받은 서비스 계정 JSON 키 파일 경로
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH}


# 위치(위경도) 컬럼 암호화 키 - openssl rand -base64 32 로 생성한 256bit 키
location:
  encryption-key: ${LOCATION_ENCRYPTION_KEY}


# CORS 허용 origin (콤마로 구분) - 로컬 프론트 개발 서버 + 실제 배포 도메인
# 값을 안 넣어도 로컬 개발 기본값(Vite 개발 서버)으로 뜨도록 기본값을 둔다.
# 배포 도메인은 반드시 CORS_ALLOWED_ORIGINS로 명시적으로 추가할 것.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# Rate limit: 신뢰 가능한 리버스 프록시 뒤가 아니면 false로 둘 것(RateLimitFilter 참고).
rate-limit:
  trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:false}


# Swagger / OpenAPI - 기본값은 비활성화(false). 로컬 개발에서 켜려면 SWAGGER_ENABLED=true를
# 명시적으로 설정할 것 — 운영 배포 시 환경변수 누락으로 실수로 노출되는 사고를 막기 위해 기본값을
# 안전한 쪽(비활성화)으로 둔다.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html


# Logging
logging:
  level:
    root: ${LOG_LEVEL}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL}