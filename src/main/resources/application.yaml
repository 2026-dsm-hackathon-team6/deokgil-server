#      bucket: ${AWS_S3_BUCKET}


# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}


# Refresh Token Cookie
cookie:
  secure: ${COOKIE_SECURE}
  same-site: ${COOKIE_SAME_SITE}
  domain: ${COOKIE_DOMAIN}


# claude AI API
claude:
  api:
    key: ${CLAUDE_API_KEY}


# 카카오 로컬 API (주소 -> 좌표 변환)
kakao:
  api:
    key: ${KAKAO_API_KEY}


# 기상청 단기예보 조회서비스 (공공데이터포털 발급 서비스키)
weather:
  api:
    key: ${WEATHER_API_KEY}


# Firebase Cloud Messaging (푸시 알림) - Firebase 콘솔에서 발급받은 서비스 계정 JSON 키 파일 경로
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH}


# 위치(위경도) 컬럼 암호화 키 - openssl rand -base64 32 로 생성한 256bit 키
location:
  encryption-key: ${LOCATION_ENCRYPTION_KEY}


# CORS 허용 origin (콤마로 구분) - 로컬 프론트 개발 서버 + 실제 배포 도메인
# 값을 안 넣어도 로컬 개발 기본값(Vite 개발 서버)으로 뜨도록 기본값을 둔다.
# 배포 도메인은 반드시 CORS_ALLOWED_ORIGINS로 명시적으로 추가할 것.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# Swagger / OpenAPI - 운영 환경에서는 SWAGGER_ENABLED=false 로 반드시 비활성화할 것
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html


# Logging
logging:
  level:
    root: ${LOG_LEVEL}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL}